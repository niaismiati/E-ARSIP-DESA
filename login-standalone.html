<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Arsip Desa - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #1e40af 100%);
    }
  </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
  <div class="bg-white/90 backdrop-blur-xl shadow-2xl rounded-3xl p-8 max-w-md w-full border border-white/20">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <svg class="w-12 h-12 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2L2 7v10c0 5.55 3.84 9.74 9 11a9.39 9.39 0 0 0 1 0c5.16-1.26 9-5.45 9-11V7l-10-5z"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-gray-900 to-gray-700 bg-clip-text text-transparent mb-2">E-Arsip Desa</h1>
      <p class="text-gray-600 font-medium">Desa Karangasem, Kec. Talun</p>
    </div>

    <!-- Form -->
    <form class="space-y-6">
      <!-- Email -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-18 0s0 0 0 0a9 9 0 0118 0z" />
          </svg>
          <input type="email" placeholder="operator@desa.id" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 outline-none bg-white/50 backdrop-blur-sm transition-all duration-300 text-lg font-medium">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
        <div class="relative">
          <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-.201A63.453 63.453 0 0 1 12 11c.408 0 .82.051 1.23.148m0 0A63.434 63.434 0 0 1 19.999 12m-1.201 3.44A63.492 63.492 0 0 1 12 11c-.408 0-.82-.051-1.23-.148m0 0A63.434 63.434 0 0 1 4.001 12m1.201 3.44A63.492 63.492 0 0 1 12 11c.408 0 .82.051 1.23.148" />
          </svg>
          <input type="password" placeholder="••••••••" class="w-full pl-12 pr-4 py-4 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-200 focus:border-blue-500 outline-none bg-white/50 backdrop-blur-sm transition-all duration-300 text-lg font-medium">
        </div>
      </div>

      <!-- Button -->
      <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-8 rounded-2xl shadow-xl hover:shadow-2xl transform hover:-translate-y-1 transition-all duration-300 text-lg">
        Masuk ke Sistem
      </button>
    </form>

    <!-- Link Daftar -->
    <div class="mt-8 text-center">
      <p class="text-sm text-gray-600 mb-4">Belum punya akun?</p>
      <a href="#" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold text-sm transition-colors">
        Daftar Sekarang
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </a>
    </div>
  </div>
</body>
</html>
